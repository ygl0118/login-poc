<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>SWAG Mock Login</title>
  <style>
    body { font-family: sans-serif; background:#111; color:#eee; }
    .screen { display:none; padding:24px; max-width:360px; }
    .screen.active { display:block; }
    .error { color:#ff6b6b; margin-top:8px; }
    input { display:block; width:100%; margin:8px 0; padding:10px; }
    button { padding:10px 16px; margin-top:8px; cursor:pointer; }
  </style>
</head>
<body>
  <!--
    本頁忠實複製 swag.live 真實登入 DOM 的關鍵結構（相同 selector 與多步流程），
    用於『離線、確定性地』驗證 POM 與斷言邏輯，不依賴正式站的 GeeTest 驗證碼。
    正確帳密由測試以 window.__MOCK_CREDS__ 注入（不寫死於程式碼）。
  -->

  <!-- 1) Landing 年齡牆 -->
  <div id="landing" class="screen active">
    <h2>SWAG</h2>
    <button type="button" data-testid="landing-login-entry" onclick="show('chooser')">帳號註冊 / 登入</button>
    <button type="button">訪客進站</button>
  </div>

  <!-- 2) 登入方式選擇（預設手機/Email 驗證碼） -->
  <div id="chooser" class="screen">
    <h3>手機號碼或 Email</h3>
    <input id="sms_or_email" placeholder="請輸入有效的手機號碼或 Email" />
    <button type="button">取得驗證碼</button>
    <button type="button" data-testid="switch-password-login" onclick="show('pwd')">帳號密碼登入</button>
  </div>

  <!-- 3) 帳號密碼登入表單 -->
  <div id="pwd" class="screen">
    <h3>帳號密碼登入</h3>
    <input id="username-form" data-testid="login-username" type="text" placeholder="請輸入使用者名稱" />
    <input id="password-form" data-testid="login-password" type="password" placeholder="請輸入 6 位數以上英文和數字" />
    <button type="button" data-testid="login-submit" onclick="submitLogin()">登入</button>
    <div id="login-error" class="error"></div>
  </div>

  <!-- 登入後右上角：頭像 + 帳號名稱（條件 5） -->
  <div id="topbar" style="display:none; position:fixed; top:8px; right:12px;">
    <img id="user-avatar" data-testid="user-avatar" width="32" height="32"
         alt="avatar"
         src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><circle cx='16' cy='16' r='16' fill='%2353e3a6'/></svg>" />
    <span id="account-name" data-testid="account-name"></span>
  </div>

  <!-- 4) 登入成功後的會員區 -->
  <div id="member" class="screen">
    <h3>歡迎回來</h3>
    <a id="user-menu" data-testid="member-menu" href="#">個人中心</a>
    <button type="button">登出</button>
  </div>

  <script>
    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function submitLogin() {
      var u = document.getElementById('username-form').value;
      var p = document.getElementById('password-form').value;
      var creds = window.__MOCK_CREDS__ || {};
      var errBox = document.getElementById('login-error');
      if (u === creds.username && p === creds.password) {
        document.cookie = 'token=mock_session_' + Date.now() + '; path=/';
        document.getElementById('account-name').textContent = u;   // 顯示登入帳號
        document.getElementById('topbar').style.display = 'block';  // 右上角頭像
        show('member');
      } else {
        errBox.textContent = '帳號/密碼錯誤';   // 紅字錯誤訊息（條件 4）
      }
    }
  </script>
</body>
</html>
